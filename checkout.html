<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagar</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="logo">🔥 AutoParts Store</div>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="cart.html">Carrito</a>
  </nav>
</header>

<main class="container">

  <h2 class="section-title">Pago con tarjeta</h2>

  <div class="product-layout">

    <!-- FORM -->
    <div class="panel">
      <h2>Datos de tarjeta</h2>

      <input type="text" placeholder="Nombre en la tarjeta">
      <input type="text" placeholder="Número de tarjeta (16 dígitos)">
      <input type="text" placeholder="Fecha de expiración (MM/AA)">
      <input type="text" placeholder="CVV">

      <button onclick="pay()">Pagar ahora</button>
    </div>

    <!-- RESUMEN -->
    <div class="panel">
      <h2>Resumen</h2>
      <div id="cartItems"></div>
      <div class="cart-total">Total: <span id="cartTotal">$0</span></div>
    </div>

  </div>

</main>

<footer>
  <p style="text-align:center;">© 2026 AutoParts Store</p>
</footer>

<script src="product.js"></script>

<script>
function pay(){
  alert("Pago realizado con éxito (simulación)");
  localStorage.removeItem("cart");
  window.location.href="index.html";
}
</script>

</body>
</html>
