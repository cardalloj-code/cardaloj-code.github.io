<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pago | Autopartes Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">Autopartes Store</div>
    <div class="topbar-right">
      <nav class="nav pro-nav">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="cart.html" class="nav-link active">Carrito</a>
        <a href="login.html" class="nav-link">Iniciar sesión</a>
        <a href="register.html" class="nav-link nav-highlight">Registrarse</a>
      </nav>
    </div>
  </header>

  <main class="pro-page">
    <section class="page-header">
      <span class="section-chip">Paso 2</span>
      <h1>Método de pago</h1>
      <p>Completa tu compra con una experiencia segura y profesional.</p>
    </section>

    <section class="checkout-layout">
      <div class="form-panel">
        <form class="pro-form" id="checkout-form">
          <h2>Pago con tarjeta</h2>

          <label>Nombre del titular
            <input type="text" required placeholder="Como aparece en la tarjeta" />
          </label>

          <label>Número de tarjeta
            <input type="text" required placeholder="1234 5678 9012 3456" maxlength="19" />
          </label>

          <div class="inline-fields">
            <label>Vencimiento
              <input type="text" required placeholder="MM/AA" maxlength="5" />
            </label>

            <label>CVV
              <input type="text" required placeholder="123" maxlength="4" />
            </label>
          </div>

          <label>Correo para confirmación
            <input type="email" required placeholder="ejemplo@correo.com" />
          </label>

          <button type="submit" class="pro-btn pro-btn-primary full-btn">Finalizar compra</button>
        </form>
      </div>

      <aside class="summary-panel">
        <h2>Resumen final</h2>
        <div class="summary-row">
          <span>Productos</span>
          <span id="checkout-items">0</span>
        </div>
        <div class="summary-row">
          <span>Total</span>
          <span id="checkout-total">$0</span>
        </div>

        <div class="summary-note" id="address-preview">
          Cargando dirección...
        </div>
      </aside>
    </section>
  </main>

  <script>
    function formatPrice(price) {
      return new Intl.NumberFormat("es-MX", {
        style: "currency",
        currency: "MXN"
      }).format(price);
    }

    function loadCheckoutData() {
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      const address = JSON.parse(localStorage.getItem("shippingAddress")) || null;

      let totalItems = 0;
      let totalPrice = 0;

      cart.forEach(item => {
        totalItems += item.quantity;
        totalPrice += item.price * item.quantity;
      });

      document.getElementById("checkout-items").textContent = totalItems;
      document.getElementById("checkout-total").textContent = formatPrice(totalPrice);

      const addressPreview = document.getElementById("address-preview");

      if (address) {
        addressPreview.innerHTML = `
          <strong>Enviar a:</strong><br>
          ${address.fullname}<br>
          ${address.street}<br>
          ${address.neighborhood}, ${address.city}, ${address.state}<br>
          CP: ${address.zip}<br>
          Tel: ${address.phone}
        `;
      } else {
        addressPreview.textContent = "No hay dirección guardada.";
      }
    }

    document.getElementById("checkout-form").addEventListener("submit", function (e) {
      e.preventDefault();
      alert("Compra realizada correctamente.");
      localStorage.removeItem("cart");
      window.location.href = "index.html";
    });

    loadCheckoutData();
  </script>
</body>
</html>
