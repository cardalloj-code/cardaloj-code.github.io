<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pago | Autopartes Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">⚙️ Autopartes Store</div>
    <div class="topbar-right">
      <nav class="nav pro-nav">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="cart.html" class="nav-link active">Carrito</a>
        <a href="login.html" class="nav-link">Iniciar sesión</a>
        <a href="register.html" class="nav-link nav-highlight">Registrarse</a>
      </nav>
    </div>
  </header>

  <main class="pro-page">
    <section class="page-header">
      <span class="section-chip">Paso 2</span>
      <h1>Método de pago</h1>
      <p>Completa tu compra con una experiencia segura y profesional.</p>
    </section>
    <section class="checkout-layout">
      <div class="form-panel">
        <form class="pro-form" id="checkout-form">
          <h2>Pago con tarjeta</h2>
          <label>Nombre del titular
            <input type="text" id="titular" required placeholder="Como aparece en la tarjeta" />
          </label>
          <label>Número de tarjeta
            <input type="text" id="numero-tarjeta" required placeholder="1234 5678 9012 3456" maxlength="19" />
          </label>
          <div class="inline-fields">
            <label>Vencimiento
              <input type="text" id="vencimiento" required placeholder="MM/AA" maxlength="5" />
            </label>
            <label>CVV
              <input type="text" id="cvv" required placeholder="123" maxlength="4" />
            </label>
          </div>
          <label>Correo para confirmación
            <input type="email" id="correo-confirmacion" required placeholder="ejemplo@correo.com" />
          </label>
          <button type="submit" class="pro-btn pro-btn-primary full-btn">Finalizar compra</button>
        </form>
      </div>
      <aside class="summary-panel">
        <h2>Resumen final</h2>
        <div class="summary-row">
          <span>Productos</span>
          <span id="checkout-items">0</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="checkout-total">$0</span>
        </div>
        <div class="summary-note" id="address-preview">
          Cargando dirección...
        </div>
      </aside>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQ-TIBlQMBo_Q5Qf6QFCKwzII3GJQ4MyI",
      authDomain: "autopartes-store.firebaseapp.com",
      projectId: "autopartes-store",
      storageBucket: "autopartes-store.firebasestorage.app",
      messagingSenderId: "98732617446",
      appId: "1:98732617446:web:437926fe4dcbdb984c5527"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    function formatPrice(price) {
      return new Intl.NumberFormat("es-MX", {
        style: "currency",
        currency: "MXN"
      }).format(price);
    }

    function loadCheckoutData() {
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      const address = JSON.parse(localStorage.getItem("shippingAddress")) || null;

      let totalItems = 0;
      let totalPrice = 0;

      cart.forEach(item => {
        totalItems += item.quantity;
        totalPrice += item.price * item.quantity;
      });

      document.getElementById("checkout-items").textContent = totalItems;
      document.getElementById("checkout-total").textContent = formatPrice(totalPrice);

      const addressPreview = document.getElementById("address-preview");
      if (address) {
        addressPreview.innerHTML = `
          <strong>Enviar a:</strong><br>
          ${address.fullname}<br>
          ${address.street}<br>
          ${address.neighborhood}, ${address.city}, ${address.state}<br>
          CP: ${address.zip}<br>
          Tel: ${address.phone}
        `;
      } else {
        addressPreview.textContent = "No hay dirección guardada.";
      }
    }

    document.getElementById("checkout-form").addEventListener("submit", async function (e) {
      e.preventDefault();

      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      const address = JSON.parse(localStorage.getItem("shippingAddress")) || {};
      const usuario = JSON.parse(localStorage.getItem("usuarioActivo")) || {};

      let totalPrice = 0;
      cart.forEach(item => totalPrice += item.price * item.quantity);

      try {
        // Guardar compra en Firestore
        await addDoc(collection(db, "compras"), {
          usuarioUid: usuario.uid || "invitado",
          usuarioCorreo: usuario.correo || document.getElementById("correo-confirmacion").value,
          productos: cart.map(item => ({
            id: item.id,
            nombre: item.name,
            precio: item.price,
            cantidad: item.quantity
          })),
          direccion: address,
          total: totalPrice,
          fecha: new Date().toISOString(),
          estado: "pendiente"
        });

        alert("✅ ¡Compra realizada correctamente! Recibirás confirmación por correo.");
        localStorage.removeItem("cart");
        window.location.href = "index.html";

      } catch (error) {
        alert("Error al procesar la compra: " + error.message);
      }
    });

    loadCheckoutData();
  </script>
</body>
</html>
