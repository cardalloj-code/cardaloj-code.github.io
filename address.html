<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dirección de envío | Autopartes Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">Autopartes Store</div>
    <div class="topbar-right">
      <nav class="nav">
        <a href="index.html">Inicio</a>
        <a href="cart.html">Carrito</a>
      </nav>
    </div>
  </header>

  <main class="pro-page">
    <section class="page-header">
      <span class="section-chip">Paso 1</span>
      <h1>Dirección de envío</h1>
      <p>Completa los datos para entregar tu pedido correctamente.</p>
    </section>

    <section class="checkout-layout">
      <div class="form-panel">
        <form class="pro-form two-columns" id="address-form">
          <label>Nombre completo
            <input type="text" id="fullname" required placeholder="Nombre y apellidos" />
          </label>

          <label>Teléfono
            <input type="tel" id="phone" required placeholder="55 1234 5678" />
          </label>

          <label class="full-width">Calle y número
            <input type="text" id="street" required placeholder="Ej. Av. Principal #123" />
          </label>

          <label>Colonia
            <input type="text" id="neighborhood" required placeholder="Colonia" />
          </label>

          <label>Código postal
            <input type="text" id="zip" required placeholder="00000" />
          </label>

          <label>Ciudad
            <input type="text" id="city" required placeholder="Ciudad" />
          </label>

          <label>Estado
            <input type="text" id="state" required placeholder="Estado" />
          </label>

          <label class="full-width">Referencias
            <textarea id="references" rows="4" placeholder="Ej. Casa blanca, portón negro, entre calles..."></textarea>
          </label>

          <button type="submit" class="pro-btn pro-btn-primary full-btn">Guardar y continuar</button>
        </form>
      </div>

      <aside class="summary-panel">
        <h2>Información de envío</h2>
        <p>Tu pedido será procesado una vez confirmados tus datos y el pago.</p>
        <div class="summary-note">
          Verifica bien la dirección para evitar retrasos en la entrega.
        </div>
      </aside>
    </section>
  </main>

  <script>
    document.getElementById("address-form").addEventListener("submit", function (e) {
      e.preventDefault();

      const addressData = {
        fullname: document.getElementById("fullname").value,
        phone: document.getElementById("phone").value,
        street: document.getElementById("street").value,
        neighborhood: document.getElementById("neighborhood").value,
        zip: document.getElementById("zip").value,
        city: document.getElementById("city").value,
        state: document.getElementById("state").value,
        references: document.getElementById("references").value
      };

      localStorage.setItem("shippingAddress", JSON.stringify(addressData));
      window.location.href = "checkout.html";
    });
  </script>
</body>
</html>
