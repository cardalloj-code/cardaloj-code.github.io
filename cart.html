<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrito | Autopartes Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">Autopartes Store</div>
    <div class="topbar-right">
      <nav class="nav pro-nav">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="cart.html" class="nav-link active">Carrito</a>
        <a href="login.html" class="nav-link">Iniciar sesión</a>
        <a href="register.html" class="nav-link nav-highlight">Registrarse</a>
      </nav>
    </div>
  </header>

  <main class="pro-page">
    <section class="page-header">
      <span class="section-chip">Resumen</span>
      <h1>Tu carrito de compras</h1>
      <p>Revisa tus productos antes de continuar al envío y al pago.</p>
    </section>

    <section class="cart-layout">
      <div class="cart-items-panel">
        <div id="cart-items"></div>
      </div>

      <aside class="summary-panel">
        <h2>Resumen del pedido</h2>
        <div class="summary-row">
          <span>Productos</span>
          <span id="summary-items">0</span>
        </div>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="summary-subtotal">$0</span>
        </div>
        <div class="summary-row">
          <span>Envío</span>
          <span>Gratis</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="summary-total">$0</span>
        </div>

        <a href="address.html" class="pro-btn pro-btn-primary full-btn">Continuar con envío</a>
        <a href="index.html" class="pro-btn pro-btn-light full-btn">Seguir comprando</a>
      </aside>
    </section>
  </main>

  <script>
    function formatPrice(price) {
      return new Intl.NumberFormat("es-MX", {
        style: "currency",
        currency: "MXN"
      }).format(price);
    }

    function loadCart() {
      const cart = JSON.parse(localStorage.getItem("cart")) || [];
      const cartItemsContainer = document.getElementById("cart-items");
      const summaryItems = document.getElementById("summary-items");
      const summarySubtotal = document.getElementById("summary-subtotal");
      const summaryTotal = document.getElementById("summary-total");

      cartItemsContainer.innerHTML = "";

      if (!cart.length) {
        cartItemsContainer.innerHTML = `
          <div class="empty-state">
            <h3>Tu carrito está vacío</h3>
            <p>Agrega productos para comenzar tu compra.</p>
            <a href="index.html" class="pro-btn pro-btn-primary">Ir a productos</a>
          </div>
        `;
        summaryItems.textContent = "0";
        summarySubtotal.textContent = formatPrice(0);
        summaryTotal.textContent = formatPrice(0);
        return;
      }

      let totalItems = 0;
      let totalPrice = 0;

      cart.forEach((item, index) => {
        totalItems += item.quantity;
        totalPrice += item.price * item.quantity;

        const itemElement = document.createElement("div");
        itemElement.className = "cart-item-card";
        itemElement.innerHTML = `
          <img src="${item.image}" alt="${item.name}" class="cart-item-image" />
          <div class="cart-item-info">
            <h3>${item.name}</h3>
            <p>${item.shortDescription || ""}</p>
            <p><strong>Precio:</strong> ${formatPrice(item.price)}</p>
            <p><strong>Cantidad:</strong> ${item.quantity}</p>
            <div class="cart-item-actions">
              <button class="mini-btn" onclick="changeQuantity(${index}, -1)">-</button>
              <button class="mini-btn" onclick="changeQuantity(${index}, 1)">+</button>
              <button class="mini-btn danger-btn" onclick="removeItem(${index})">Eliminar</button>
            </div>
          </div>
        `;

        cartItemsContainer.appendChild(itemElement);
      });

      summaryItems.textContent = totalItems;
      summarySubtotal.textContent = formatPrice(totalPrice);
      summaryTotal.textContent = formatPrice(totalPrice);
    }

    function changeQuantity(index, change) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      if (!cart[index]) return;

      cart[index].quantity += change;

      if (cart[index].quantity <= 0) {
        cart.splice(index, 1);
      }

      localStorage.setItem("cart", JSON.stringify(cart));
      loadCart();
    }

    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.splice(index, 1);
      localStorage.setItem("cart", JSON.stringify(cart));
      loadCart();
    }

    loadCart();
  </script>
</body>
</html>
