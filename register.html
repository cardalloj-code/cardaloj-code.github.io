<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro | Autopartes Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">Autopartes Store</div>
    <div class="topbar-right">
      <nav class="nav pro-nav">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="cart.html" class="nav-link">Carrito</a>
        <a href="login.html" class="nav-link">Iniciar sesión</a>
        <a href="register.html" class="nav-link active nav-highlight">Registrarse</a>
      </nav>
    </div>
  </header>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-left">
        <span class="auth-badge">Crea tu cuenta</span>
        <h1>Regístrate y compra más rápido</h1>
        <p>Guarda tus datos, direcciones y pedidos en una experiencia más cómoda y profesional.</p>
      </div>
      <div class="auth-right">
        <form class="pro-form" id="register-form">
          <h2>Crear cuenta</h2>
          <label for="register-name">Nombre completo</label>
          <input type="text" id="register-name" placeholder="Tu nombre completo" required />
          <label for="register-email">Correo electrónico</label>
          <input type="email" id="register-email" placeholder="ejemplo@correo.com" required />
          <label for="register-password">Contraseña</label>
          <input type="password" id="register-password" placeholder="Mínimo 6 caracteres" required />
          <label for="register-confirm-password">Confirmar contraseña</label>
          <input type="password" id="register-confirm-password" placeholder="Repite tu contraseña" required />
          <button type="submit" class="pro-btn pro-btn-primary full-btn">Crear cuenta</button>
          <p class="form-helper">
            ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
          </p>
        </form>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQ-TIBlQMBo_Q5Qf6QFCKwzII3GJQ4MyI",
      authDomain: "autopartes-store.firebaseapp.com",
      projectId: "autopartes-store",
      storageBucket: "autopartes-store.firebasestorage.app",
      messagingSenderId: "98732617246",
      appId: "1:98732617446:web:437926fe4dcbdb984c5527"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    document.getElementById("register-form").addEventListener("submit", async function (e) {
      e.preventDefault();

      const nombre = document.getElementById("register-name").value;
      const correo = document.getElementById("register-email").value;
      const password = document.getElementById("register-password").value;
      const confirmar = document.getElementById("register-confirm-password").value;

      if (password !== confirmar) {
        alert("Las contraseñas no coinciden.");
        return;
      }

      try {
        // Crear usuario en Firebase Auth
        const resultado = await createUserWithEmailAndPassword(auth, correo, password);
        const uid = resultado.user.uid;

        // Guardar datos en Firestore (base de datos)
        await setDoc(doc(db, "usuarios", uid), {
          nombre: nombre,
          correo: correo,
          fechaRegistro: new Date().toISOString(),
          rol: "cliente"
        });

        alert("¡Registro exitoso! Bienvenido " + nombre);
        window.location.href = "login.html";

      } catch (error) {
        if (error.code === "auth/email-already-in-use") {
          alert("Este correo ya está registrado. Intenta iniciar sesión.");
        } else if (error.code === "auth/weak-password") {
          alert("La contraseña debe tener al menos 6 caracteres.");
        } else if (error.code === "auth/invalid-email") {
          alert("El correo no es válido.");
        } else {
          alert("Error: " + error.message);
        }
      }
    });
  </script>
</body>
</html>
