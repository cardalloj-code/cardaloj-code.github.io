<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión | Autopartes Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">Autopartes Store</div>
    <div class="topbar-right">
      <nav class="nav pro-nav">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="cart.html" class="nav-link">Carrito</a>
        <a href="login.html" class="nav-link active">Iniciar sesión</a>
        <a href="register.html" class="nav-link nav-highlight">Registrarse</a>
      </nav>
    </div>
  </header>
  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-left">
        <span class="auth-badge">Bienvenido de nuevo</span>
        <h1>Inicia sesión en tu cuenta</h1>
        <p>Accede para revisar tus pedidos, guardar direcciones y continuar con tus compras.</p>
      </div>
      <div class="auth-right">
        <form class="pro-form" id="login-form">
          <h2>Iniciar sesión</h2>
          <label for="login-email">Correo electrónico</label>
          <input type="email" id="login-email" placeholder="ejemplo@correo.com" required />
          <label for="login-password">Contraseña</label>
          <input type="password" id="login-password" placeholder="********" required />
          <button type="submit" class="pro-btn pro-btn-primary full-btn">Entrar</button>
          <p class="form-helper">
            ¿No tienes cuenta? <a href="register.html">Crear una cuenta</a>
          </p>
        </form>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBQ-TIBlQMBo_Q5Qf6QFCKwzII3GJQ4MyI",
      authDomain: "autopartes-store.firebaseapp.com",
      projectId: "autopartes-store",
      storageBucket: "autopartes-store.firebasestorage.app",
      messagingSenderId: "98732617446",
      appId: "1:98732617446:web:437926fe4dcbdb984c5527"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("login-form").addEventListener("submit", async function (e) {
      e.preventDefault();

      const correo = document.getElementById("login-email").value;
      const password = document.getElementById("login-password").value;

      try {
        const resultado = await signInWithEmailAndPassword(auth, correo, password);
        const usuario = resultado.user;

        // Guardar sesión en localStorage
        localStorage.setItem("usuarioActivo", JSON.stringify({
          uid: usuario.uid,
          correo: usuario.email
        }));

        alert("¡Bienvenido!");
        window.location.href = "index.html";

      } catch (error) {
        if (error.code === "auth/user-not-found" || error.code === "auth/wrong-password" || error.code === "auth/invalid-credential") {
          alert("Correo o contraseña incorrectos.");
        } else if (error.code === "auth/invalid-email") {
          alert("El correo no es válido.");
        } else {
          alert("Error: " + error.message);
        }
      }
    });
  </script>
</body>
</html>
