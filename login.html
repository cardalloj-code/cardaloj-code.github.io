<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión | Autopartes Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="logo">Autopartes Store</div>
    <div class="topbar-right">
      <nav class="nav pro-nav">
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="cart.html" class="nav-link">Carrito</a>
        <a href="login.html" class="nav-link active">Iniciar sesión</a>
        <a href="register.html" class="nav-link nav-highlight">Registrarse</a>
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <section class="auth-card">
      <div class="auth-left">
        <span class="auth-badge">Bienvenido de nuevo</span>
        <h1>Inicia sesión en tu cuenta</h1>
        <p>Accede para revisar tus pedidos, guardar direcciones y continuar con tus compras.</p>
      </div>

      <div class="auth-right">
        <form class="pro-form" id="login-form">
          <h2>Iniciar sesión</h2>

          <label for="login-email">Correo electrónico</label>
          <input type="email" id="login-email" placeholder="ejemplo@correo.com" required />

          <label for="login-password">Contraseña</label>
          <input type="password" id="login-password" placeholder="********" required />

          <button type="submit" class="pro-btn pro-btn-primary full-btn">Entrar</button>

          <p class="form-helper">
            ¿No tienes cuenta? <a href="register.html">Crear una cuenta</a>
          </p>
        </form>
      </div>
    </section>
  </main>

  <script>
    document.getElementById("login-form").addEventListener("submit", function (e) {
      e.preventDefault();
      alert("Inicio de sesión simulado correctamente.");
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
